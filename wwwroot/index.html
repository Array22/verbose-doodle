<!DOCTYPE html>
<html>
<head>
    <title>Text to String</title>
    <link href="style.css" rel="stylesheet"> 
</head>
<body>
<h1 class="tab">
    Number to Cash Converter
</h1>
<main class="main">
    <p>Example: 1 => ONE DOLLAR</p>
    Enter
    <input id="user-input" placeholder="amount">
    <button onclick="sendInput()" id="input-run">run</button>
    <div>
        Answer:
        <p id="response"></p>
    </div>
</main>
</body>
<script>
    async function sendInput(){
        const inputAmount = document.querySelector("#user-input").value;
        const response = document.querySelector("#response");
        const request = await fetch("/money", {
            method: "POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({Amount: inputAmount})
        });
        const result = await request.text()
        response.innerText = result;
        if (request.ok){
            response.style.color = "black"
        } else {
            response.style.color = "red"
        }
        
    };
</script>
</html>
